<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trueleqtric — Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display" style="display:none;position:fixed;top:0;left:0;width:100%;background:white;color:red;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;border-bottom:5px solid red"></div>
    <script>
      window.onerror = function(msg, url, line) {
        var d = document.getElementById('error-display');
        d.style.display = 'block';
        d.innerText = 'CLIENT ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + line;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
